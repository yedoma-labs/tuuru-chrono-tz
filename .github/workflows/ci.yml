name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [18, 20, 22, 24]
        include:
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (ESM + CJS)
        run: pnpm build

      - name: Test
        # explicit file list: --test glob needs Node >=21, directory form is unreliable
        run: node --test test/datetime.test.js test/duration.test.js test/timezone.test.js test/locale.test.js test/locales.test.js test/calendar.test.js test/local.test.js test/exports.test.js test/security.test.js test/cjs.test.js

      - name: Manual verification scripts
        run: |
          node test-datetime.js
          node test-timezone.js

      - name: Bundle size check
        run: node scripts/check-size.js
